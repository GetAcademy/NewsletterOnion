<!doctype html>
<html lang="no">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verifiser abonnement</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef4f8;
            --ink: #1e2930;
            --muted: #64727a;
            --line: #cbd6dc;
            --accent: #276a8f;
            --accent-strong: #1f4e69;
            --panel: #ffffff;
            --error: #a33434;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 80% 15%, rgba(39, 106, 143, 0.16), transparent 28rem),
                linear-gradient(135deg, #eef4f8 0%, #f7f3ea 100%);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100% - 2rem, 34rem);
            padding: 2rem;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 1.25rem 3rem rgba(30, 41, 48, 0.12);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2rem, 8vw, 3.25rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .message {
            margin-top: 1.25rem;
            font-weight: 700;
            color: var(--accent-strong);
        }

        .message.error {
            color: var(--error);
        }

        a {
            display: inline-flex;
            margin-top: 1.5rem;
            min-height: 3rem;
            align-items: center;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            padding: 0 1rem;
            font-weight: 700;
            text-decoration: none;
        }

        a:hover,
        a:focus-visible {
            background: var(--accent-strong);
        }

        @media (max-width: 34rem) {
            main {
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Verifisering</h1>
        <p id="lead">Vi sjekker lenken din.</p>
        <div id="message" class="message" role="status" aria-live="polite">Venter...</div>
        <a href="/subscribe.html">Til abonnement</a>
    </main>

    <script>
        const lead = document.querySelector("#lead");
        const message = document.querySelector("#message");
        const code = new URLSearchParams(window.location.search).get("code");

        verify();

        async function verify() {
            if (!code) {
                show("Verifiseringskode mangler.", true);
                return;
            }

            try {
                const response = await fetch(`/verify?code=${encodeURIComponent(code)}`);
                const data = await response.json();
                show(data.message, !response.ok);
                lead.textContent = response.ok
                    ? "Abonnementet er klart."
                    : "Lenken kunne ikke brukes.";
            } catch {
                show("Kunne ikke kontakte API-et.", true);
            }
        }

        function show(text, isError) {
            message.textContent = text;
            message.className = isError ? "message error" : "message";
        }
    </script>
</body>
</html>
